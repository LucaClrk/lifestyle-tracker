<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition — Performance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; padding: 2rem; }

        .topbar { display: flex; align-items: center; gap: 0.75rem; max-width: 860px; margin: 0 auto 2rem; }
        .back { color: #555; text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
        .back:hover { color: #aaa; }
        .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .spacer { flex: 1; }

        .date-nav { display: flex; align-items: center; gap: 0.5rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 0.35rem 0.75rem; }
        .date-nav button { background: none; border: none; color: #666; cursor: pointer; font-size: 1rem; padding: 0 0.2rem; transition: color 0.15s; }
        .date-nav button:hover { color: #ccc; }
        .date-nav input[type=date] { background: none; border: none; color: #ccc; font-size: 0.85rem; font-family: inherit; cursor: pointer; outline: none; }

        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #e5e5e5; }
        .btn-ghost { background: transparent; color: #888; border: 1px solid #333; }
        .btn-ghost:hover { color: #ccc; border-color: #555; }
        .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }

        .content { max-width: 860px; margin: 0 auto; }

        /* Macro cards */
        .macro-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
        .macro-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1rem; text-align: center; }
        .macro-card .value { font-size: 1.45rem; font-weight: 700; line-height: 1; }
        .macro-card .unit { font-size: 0.68rem; color: #555; margin-top: 0.1rem; }
        .macro-card .label { font-size: 0.68rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.4rem; }
        .macro-card.kcal .value { color: #f59e0b; }
        .macro-card.protein .value { color: #60a5fa; }
        .macro-card.carbs .value { color: #a78bfa; }
        .macro-card.fat .value { color: #f87171; }

        /* Macro bar */
        .macro-bar-wrap { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 2rem; }
        .macro-bar-label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
        .macro-bar-track { height: 10px; border-radius: 99px; overflow: hidden; display: flex; background: #222; }
        .bar-seg { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
        .bar-seg.protein { background: #2563eb; }
        .bar-seg.carbs { background: #7c3aed; }
        .bar-seg.fat { background: #dc2626; }
        .macro-legend { display: flex; gap: 1.25rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: #666; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend-dot.protein { background: #2563eb; }
        .legend-dot.carbs { background: #7c3aed; }
        .legend-dot.fat { background: #dc2626; }

        /* Meals */
        .section { margin-bottom: 2rem; }
        .section-header { font-size: 0.75rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.65rem; display: flex; align-items: center; gap: 0.5rem; }
        .meal-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
        .meal-kcal { font-size: 0.75rem; color: #555; text-transform: none; letter-spacing: 0; }

        .food-row { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 0.65rem 0.9rem; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.75rem; transition: border-color 0.15s; }
        .food-row:hover { border-color: #333; }
        .food-name { font-size: 0.88rem; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .food-qty { font-size: 0.75rem; color: #555; white-space: nowrap; }
        .food-macro { font-size: 0.73rem; white-space: nowrap; }
        .food-macro.p { color: #60a5fa; }
        .food-macro.c { color: #a78bfa; }
        .food-macro.f { color: #f87171; }
        .food-kcal { font-size: 0.82rem; font-weight: 600; color: #f59e0b; white-space: nowrap; min-width: 52px; text-align: right; }
        .row-actions { display: flex; gap: 0.25rem; opacity: 0; transition: opacity 0.15s; }
        .food-row:hover .row-actions { opacity: 1; }
        .icon-btn { background: none; border: none; color: #555; cursor: pointer; padding: 0.2rem 0.3rem; border-radius: 5px; font-size: 0.82rem; transition: color 0.15s; }
        .icon-btn:hover { color: #ccc; }
        .icon-btn.del:hover { color: #f87171; }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .overlay.hidden { display: none; }
        .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .modal-title { font-size: 1rem; font-weight: 600; }
        .modal-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 4px; }
        .modal-close:hover { color: #ccc; }
        .field { margin-bottom: 0.85rem; }
        .field label { display: block; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
        .field input, .field select { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.6rem 0.75rem; color: #f0f0f0; font-size: 0.9rem; font-family: inherit; transition: border-color 0.15s; }
        .field input:focus, .field select:focus { outline: none; border-color: #555; }
        .field select option { background: #1a1a1a; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
        .delete-zone { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid #222; }
        .btn-danger-sm { background: transparent; border: 1px solid #3a1a1a; color: #f87171; font-size: 0.78rem; padding: 0.3rem 0.65rem; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .btn-danger-sm:hover { background: #2a1010; }

        /* Toast */
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 0.7rem 1.1rem; font-size: 0.85rem; color: #ccc; z-index: 200; transform: translateY(1rem); opacity: 0; transition: all 0.25s; pointer-events: none; max-width: 260px; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #166534; color: #a3e635; }
        .toast.error { border-color: #7f1d1d; color: #f87171; }

        .empty { color: #444; font-size: 0.85rem; padding: 0.5rem 0; }
        .add-meal-btn { display: flex; align-items: center; gap: 0.4rem; color: #555; font-size: 0.8rem; cursor: pointer; padding: 0.4rem 0; border: none; background: none; font-family: inherit; transition: color 0.15s; }
        .add-meal-btn:hover { color: #aaa; }

        @media (max-width: 580px) {
            .macro-row { grid-template-columns: repeat(2, 1fr); }
            .food-macro, .food-qty { display: none; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a class="back" href="/">← Home</a>
    <h1 class="page-title">Nutrition</h1>
    <div class="spacer"></div>
    <div class="date-nav">
        <button onclick="changeDay(-1)">‹</button>
        <input type="date" id="date-picker" onchange="loadFood()">
        <button onclick="changeDay(1)">›</button>
    </div>
    <button class="btn btn-primary" onclick="openAdd()">+ Add food</button>
</div>

<div class="content">
    <div class="macro-row">
        <div class="macro-card kcal"><div class="value" id="tot-kcal">—</div><div class="unit">kcal</div><div class="label">Calories</div></div>
        <div class="macro-card protein"><div class="value" id="tot-prot">—</div><div class="unit">g</div><div class="label">Protein</div></div>
        <div class="macro-card carbs"><div class="value" id="tot-carbs">—</div><div class="unit">g</div><div class="label">Carbs</div></div>
        <div class="macro-card fat"><div class="value" id="tot-fat">—</div><div class="unit">g</div><div class="label">Fat</div></div>
    </div>
    <div class="macro-bar-wrap">
        <div class="macro-bar-label">Macro split (kcal from macros)</div>
        <div class="macro-bar-track">
            <div class="bar-seg protein" id="bar-p" style="width:0%"></div>
            <div class="bar-seg carbs" id="bar-c" style="width:0%"></div>
            <div class="bar-seg fat" id="bar-f" style="width:0%"></div>
        </div>
        <div class="macro-legend">
            <div class="legend-item"><div class="legend-dot protein"></div><span id="leg-p">Protein —%</span></div>
            <div class="legend-item"><div class="legend-dot carbs"></div><span id="leg-c">Carbs —%</span></div>
            <div class="legend-item"><div class="legend-dot fat"></div><span id="leg-f">Fat —%</span></div>
        </div>
    </div>
    <div id="meals-content"></div>
</div>

<!-- Modal -->
<div class="overlay hidden" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">Add food</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form id="food-form" onsubmit="submitFood(event)">
            <div class="field-row">
                <div class="field">
                    <label>Meal</label>
                    <select id="f-meal">
                        <option value="BREAKFAST">☀️ Breakfast</option>
                        <option value="LUNCH">🌤️ Lunch</option>
                        <option value="DINNER">🌙 Dinner</option>
                        <option value="SNACK">🍎 Snack</option>
                    </select>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input id="f-date" type="date" required>
                </div>
            </div>
            <div class="field">
                <label>Food name</label>
                <input id="f-name" type="text" required maxlength="200" placeholder="e.g. Chicken breast">
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Quantity</label>
                    <input id="f-qty" type="number" step="0.1" min="0" placeholder="e.g. 150">
                </div>
                <div class="field">
                    <label>Unit</label>
                    <input id="f-unit" type="text" maxlength="20" placeholder="g, ml, cup…">
                </div>
            </div>
            <div class="field">
                <label>Calories (kcal)</label>
                <input id="f-kcal" type="number" min="0" required value="0">
            </div>
            <div class="field-row3">
                <div class="field">
                    <label>Protein (g)</label>
                    <input id="f-prot" type="number" step="0.1" min="0" value="0">
                </div>
                <div class="field">
                    <label>Carbs (g)</label>
                    <input id="f-carbs" type="number" step="0.1" min="0" value="0">
                </div>
                <div class="field">
                    <label>Fat (g)</label>
                    <input id="f-fat" type="number" step="0.1" min="0" value="0">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary btn-sm" id="submit-btn">Add food</button>
            </div>
        </form>
        <div class="delete-zone" id="delete-zone" style="display:none">
            <button class="btn-danger-sm" onclick="deleteFood()">Delete entry</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const mealOrder = ['BREAKFAST','LUNCH','DINNER','SNACK'];
    const mealIcons = { BREAKFAST:'☀️', LUNCH:'🌤️', DINNER:'🌙', SNACK:'🍎' };
    const cap = s => s.charAt(0)+s.slice(1).toLowerCase();

    let entries = [], editingId = null, currentDate = new Date().toISOString().slice(0,10);

    document.getElementById('date-picker').value = currentDate;

    function changeDay(dir) {
        const d = new Date(currentDate); d.setDate(d.getDate()+dir);
        currentDate = d.toISOString().slice(0,10);
        document.getElementById('date-picker').value = currentDate;
        loadFood();
    }

    async function loadFood() {
        currentDate = document.getElementById('date-picker').value;
        try {
            const isToday = currentDate === new Date().toISOString().slice(0,10);
            const url = isToday ? '/api/users/1/food/today' : `/api/users/1/food?date=${currentDate}`;
            entries = await api(url);
            render();
        } catch(e) { document.getElementById('meals-content').innerHTML = '<div class="empty">Failed to load.</div>'; }
    }

    function render() {
        let totKcal=0, totP=0, totC=0, totF=0;
        entries.forEach(e => { totKcal+=e.calories||0; totP+=e.proteinG||0; totC+=e.carbsG||0; totF+=e.fatG||0; });

        document.getElementById('tot-kcal').textContent = totKcal;
        document.getElementById('tot-prot').textContent = totP.toFixed(1);
        document.getElementById('tot-carbs').textContent = totC.toFixed(1);
        document.getElementById('tot-fat').textContent = totF.toFixed(1);

        const pKcal=totP*4, cKcal=totC*4, fKcal=totF*9, macroTotal=pKcal+cKcal+fKcal||1;
        const pPct=(pKcal/macroTotal*100).toFixed(1), cPct=(cKcal/macroTotal*100).toFixed(1), fPct=(fKcal/macroTotal*100).toFixed(1);
        document.getElementById('bar-p').style.width=pPct+'%';
        document.getElementById('bar-c').style.width=cPct+'%';
        document.getElementById('bar-f').style.width=fPct+'%';
        document.getElementById('leg-p').textContent=`Protein ${pPct}%`;
        document.getElementById('leg-c').textContent=`Carbs ${cPct}%`;
        document.getElementById('leg-f').textContent=`Fat ${fPct}%`;

        const container = document.getElementById('meals-content');
        container.innerHTML = '';

        const byMeal = {};
        entries.forEach(e => { const m=e.mealType||'SNACK'; if(!byMeal[m])byMeal[m]=[]; byMeal[m].push(e); });
        const ordered = [...mealOrder.filter(m=>byMeal[m]), ...Object.keys(byMeal).filter(m=>!mealOrder.includes(m))];

        if (!entries.length) {
            mealOrder.forEach(meal => container.appendChild(buildMealSection(meal, [], [])));
            return;
        }

        ordered.forEach(meal => {
            container.appendChild(buildMealSection(meal, byMeal[meal]||[], entries));
        });
        const presentMeals = new Set(ordered);
        mealOrder.filter(m => !presentMeals.has(m)).forEach(meal => {
            container.appendChild(buildMealSection(meal, [], []));
        });
    }

    function buildMealSection(meal, mealEntries, all) {
        const mealKcal = mealEntries.reduce((s,e)=>s+(e.calories||0),0);
        const sec = document.createElement('div'); sec.className = 'section';
        const headerEl = document.createElement('div'); headerEl.className = 'section-header';
        headerEl.innerHTML = `
            <span>${mealIcons[meal]||'🍽️'} ${cap(meal)}</span>
            <div class="meal-right">
                ${mealKcal > 0 ? `<span class="meal-kcal">${mealKcal} kcal</span>` : ''}
                <button class="add-meal-btn" onclick="openAdd('${meal}')">+ Add</button>
            </div>`;
        sec.appendChild(headerEl);

        mealEntries.forEach(e => {
            const row = document.createElement('div'); row.className = 'food-row';
            const qty = e.quantity ? `${e.quantity}${e.unit?' '+e.unit:''}` : '';
            row.innerHTML = `
                <span class="food-name">${esc(e.foodName)}</span>
                <span class="food-qty">${qty}</span>
                <span class="food-macro p">${(e.proteinG||0).toFixed(1)}g P</span>
                <span class="food-macro c">${(e.carbsG||0).toFixed(1)}g C</span>
                <span class="food-macro f">${(e.fatG||0).toFixed(1)}g F</span>
                <span class="food-kcal">${e.calories} kcal</span>
                <div class="row-actions">
                    <button class="icon-btn" onclick="openEdit(${e.id})" title="Edit">✎</button>
                    <button class="icon-btn del" onclick="confirmDelete(${e.id})" title="Delete">✕</button>
                </div>`;
            sec.appendChild(row);
        });
        if (!mealEntries.length) {
            const empty = document.createElement('div'); empty.className = 'empty';
            empty.textContent = 'Nothing logged yet.';
            sec.appendChild(empty);
        }
        return sec;
    }

    function openAdd(meal) {
        editingId = null;
        document.getElementById('modal-title').textContent = 'Add food';
        document.getElementById('food-form').reset();
        document.getElementById('f-date').value = currentDate;
        if (meal) document.getElementById('f-meal').value = meal;
        document.getElementById('f-kcal').value = '0';
        document.getElementById('f-prot').value = '0';
        document.getElementById('f-carbs').value = '0';
        document.getElementById('f-fat').value = '0';
        document.getElementById('delete-zone').style.display = 'none';
        document.getElementById('submit-btn').textContent = 'Add food';
        document.getElementById('overlay').classList.remove('hidden');
        setTimeout(() => document.getElementById('f-name').focus(), 50);
    }

    function openEdit(id) {
        const e = entries.find(x=>x.id===id); if (!e) return;
        editingId = id;
        document.getElementById('modal-title').textContent = 'Edit food entry';
        document.getElementById('f-meal').value = e.mealType;
        document.getElementById('f-date').value = e.entryDate || currentDate;
        document.getElementById('f-name').value = e.foodName;
        document.getElementById('f-qty').value = e.quantity || '';
        document.getElementById('f-unit').value = e.unit || '';
        document.getElementById('f-kcal').value = e.calories || 0;
        document.getElementById('f-prot').value = e.proteinG || 0;
        document.getElementById('f-carbs').value = e.carbsG || 0;
        document.getElementById('f-fat').value = e.fatG || 0;
        document.getElementById('delete-zone').style.display = 'block';
        document.getElementById('submit-btn').textContent = 'Save changes';
        document.getElementById('overlay').classList.remove('hidden');
        setTimeout(() => document.getElementById('f-name').focus(), 50);
    }

    async function submitFood(ev) {
        ev.preventDefault();
        const body = {
            entryDate: document.getElementById('f-date').value,
            mealType: document.getElementById('f-meal').value,
            foodName: document.getElementById('f-name').value.trim(),
            calories: parseInt(document.getElementById('f-kcal').value)||0,
            proteinG: parseFloat(document.getElementById('f-prot').value)||0,
            carbsG: parseFloat(document.getElementById('f-carbs').value)||0,
            fatG: parseFloat(document.getElementById('f-fat').value)||0,
            quantity: parseFloat(document.getElementById('f-qty').value)||0,
            unit: document.getElementById('f-unit').value.trim()||null
        };
        try {
            const url = editingId ? `/api/users/1/food/${editingId}` : '/api/users/1/food';
            const method = editingId ? 'PUT' : 'POST';
            await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
            closeModal(); await loadFood(); toast(editingId?'Entry updated':'Food added','success');
        } catch(e) { toast('Failed to save','error'); }
    }

    async function deleteFood() {
        if (!editingId) return;
        if (!confirm('Delete this entry?')) return;
        try {
            await fetch(`/api/users/1/food/${editingId}`, { method:'DELETE' });
            closeModal(); await loadFood(); toast('Deleted','success');
        } catch(e) { toast('Failed to delete','error'); }
    }

    async function confirmDelete(id) {
        if (!confirm('Delete this food entry?')) return;
        try {
            await fetch(`/api/users/1/food/${id}`, { method:'DELETE' });
            await loadFood(); toast('Deleted','success');
        } catch(e) { toast('Failed to delete','error'); }
    }

    function closeModal() { document.getElementById('overlay').classList.add('hidden'); editingId = null; }
    document.getElementById('overlay').addEventListener('click', e => { if (e.target===document.getElementById('overlay')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

    let toastTimer;
    function toast(msg, type='') {
        const el = document.getElementById('toast');
        el.textContent = msg; el.className = `toast ${type}`;
        void el.offsetWidth; el.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    async function api(url) { const r = await fetch(url); if (!r.ok) throw new Error(); return r.json(); }

    loadFood();
</script>
</body>
</html>
