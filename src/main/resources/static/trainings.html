<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainings — Performance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; padding: 2rem; }

        .topbar { display: flex; align-items: center; gap: 0.75rem; max-width: 960px; margin: 0 auto 2rem; }
        .back { color: #555; text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
        .back:hover { color: #aaa; }
        .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .spacer { flex: 1; }

        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #e5e5e5; }
        .btn-ghost { background: transparent; color: #888; border: 1px solid #333; }
        .btn-ghost:hover { color: #ccc; border-color: #555; }
        .btn-green { background: #1a2e05; color: #a3e635; border: 1px solid #2a4010; }
        .btn-green:hover { background: #22380a; }
        .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
        .btn-danger-sm { background: transparent; border: 1px solid #3a1a1a; color: #f87171; font-size: 0.78rem; padding: 0.3rem 0.65rem; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .btn-danger-sm:hover { background: #2a1010; }

        .content { max-width: 960px; margin: 0 auto; }

        /* Sport summary */
        .sport-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .sport-stat { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 0.75rem 1.2rem; text-align: center; min-width: 90px; }
        .sport-stat .icon { font-size: 1.25rem; }
        .sport-stat .count { font-size: 1.35rem; font-weight: 700; margin-top: 0.2rem; }
        .sport-stat .name { font-size: 0.68rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Filters */
        .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .pill { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 999px; padding: 0.35rem 0.85rem; font-size: 0.8rem; color: #888; cursor: pointer; transition: all 0.15s; }
        .pill:hover { border-color: #555; color: #ccc; }
        .pill.active { border-color: #555; color: #fff; background: #222; }

        /* Section */
        .section { margin-bottom: 2.5rem; }
        .section-header { font-size: 0.75rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }

        /* Upcoming cards */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.75rem; }

        .t-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px; padding: 1.1rem 1.2rem; transition: border-color 0.15s; position: relative; }
        .t-card:hover { border-color: #3a3a3a; }

        .t-sport-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
        .t-icon { font-size: 1.4rem; }
        .t-sport-name { font-size: 0.95rem; font-weight: 600; flex: 1; }

        .t-badge { font-size: 0.62rem; padding: 0.18rem 0.5rem; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        .t-badge.done { background: #1a2e05; color: #a3e635; }
        .t-badge.upcoming { background: #1e3a5f; color: #60a5fa; }
        .t-badge.missed { background: #2a1010; color: #f87171; }

        .t-date { font-size: 0.8rem; color: #666; margin-bottom: 0.25rem; }
        .t-details { font-size: 0.8rem; color: #555; display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
        .t-notes { font-size: 0.76rem; color: #444; line-height: 1.5; border-top: 1px solid #222; padding-top: 0.6rem; margin-bottom: 0.8rem; }
        .t-feedback { font-size: 0.76rem; color: #555; font-style: italic; border-top: 1px solid #222; padding-top: 0.5rem; margin-bottom: 0.8rem; }

        .t-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        /* Past list */
        .past-list { display: flex; flex-direction: column; gap: 0.4rem; }
        .past-row { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.9rem; }
        .past-icon { font-size: 1rem; flex-shrink: 0; }
        .past-name { font-size: 0.85rem; font-weight: 500; flex: 1; }
        .past-date { font-size: 0.76rem; color: #555; white-space: nowrap; }
        .past-dur { font-size: 0.76rem; color: #555; white-space: nowrap; }
        .past-actions { display: flex; gap: 0.3rem; opacity: 0; transition: opacity 0.15s; }
        .past-row:hover .past-actions { opacity: 1; }
        .icon-btn { background: none; border: none; color: #555; cursor: pointer; padding: 0.2rem 0.3rem; border-radius: 5px; font-size: 0.85rem; transition: color 0.15s; }
        .icon-btn:hover { color: #ccc; }
        .icon-btn.del:hover { color: #f87171; }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .overlay.hidden { display: none; }
        .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .modal-title { font-size: 1rem; font-weight: 600; }
        .modal-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 4px; }
        .modal-close:hover { color: #ccc; }

        .field { margin-bottom: 0.85rem; }
        .field label { display: block; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
        .field input, .field select, .field textarea { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.6rem 0.75rem; color: #f0f0f0; font-size: 0.9rem; font-family: inherit; transition: border-color 0.15s; }
        .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #555; }
        .field select option { background: #1a1a1a; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
        .delete-zone { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid #222; }

        .recur-box { background: #111; border: 1px solid #222; border-radius: 10px; padding: 0.85rem; margin-top: 0.5rem; }
        .recur-box .field { margin-bottom: 0.6rem; }
        .recur-box .field:last-child { margin-bottom: 0; }

        .toggle-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.85rem; cursor: pointer; }
        .toggle-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #a3e635; cursor: pointer; }
        .toggle-row span { font-size: 0.85rem; color: #888; }

        /* Toast */
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 0.7rem 1.1rem; font-size: 0.85rem; color: #ccc; z-index: 200; transform: translateY(1rem); opacity: 0; transition: all 0.25s; pointer-events: none; max-width: 280px; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #166534; color: #a3e635; }
        .toast.error { border-color: #7f1d1d; color: #f87171; }

        .empty { color: #444; font-size: 0.85rem; padding: 0.75rem 0; }
        .loading-msg { color: #444; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="topbar">
    <a class="back" href="/">← Home</a>
    <h1 class="page-title">Trainings</h1>
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="openAdd()">+ Add training</button>
</div>

<div class="content">
    <div class="sport-stats" id="sport-stats"></div>
    <div class="filters" id="filters">
        <span class="pill active" data-sport="ALL">All</span>
        <span class="pill" data-sport="RUNNING">🏃 Running</span>
        <span class="pill" data-sport="TENNIS">🎾 Tennis</span>
        <span class="pill" data-sport="CYCLING">🚴 Cycling</span>
        <span class="pill" data-sport="OTHER">💪 Other</span>
    </div>
    <div class="section">
        <div class="section-header">Upcoming</div>
        <div class="card-grid" id="upcoming-grid"><div class="loading-msg">Loading…</div></div>
    </div>
    <div class="section">
        <div class="section-header">Past sessions</div>
        <div class="past-list" id="past-list"><div class="loading-msg">Loading…</div></div>
    </div>
</div>

<!-- Main add/edit modal -->
<div class="overlay hidden" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">Add training</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form id="training-form" onsubmit="submitTraining(event)">
            <div class="field-row">
                <div class="field">
                    <label>Sport</label>
                    <select id="f-sport">
                        <option value="RUNNING">🏃 Running</option>
                        <option value="TENNIS">🎾 Tennis</option>
                        <option value="CYCLING">🚴 Cycling</option>
                        <option value="OTHER">💪 Other</option>
                    </select>
                </div>
                <div class="field">
                    <label>Duration (min)</label>
                    <input id="f-dur" type="number" min="1" value="60" required>
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Date</label>
                    <input id="f-date" type="date" required>
                </div>
                <div class="field">
                    <label>Time</label>
                    <input id="f-time" type="time" value="07:00" required>
                </div>
            </div>
            <div class="field">
                <label>Distance (km, optional)</label>
                <input id="f-dist" type="number" step="0.1" min="0" placeholder="e.g. 10">
            </div>
            <div class="field">
                <label>Notes</label>
                <input id="f-notes" type="text" maxlength="300" placeholder="Optional">
            </div>

            <!-- Recurring (only for new trainings) -->
            <div id="recur-section">
                <label class="toggle-row">
                    <input type="checkbox" id="f-recur" onchange="toggleRecur()">
                    <span>Repeat this training</span>
                </label>
                <div class="recur-box" id="recur-box" style="display:none">
                    <div class="field-row">
                        <div class="field">
                            <label>Frequency</label>
                            <select id="f-freq">
                                <option value="daily">Daily</option>
                                <option value="weekly" selected>Weekly</option>
                                <option value="monthly">Monthly</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Until date</label>
                            <input id="f-until" type="date">
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary btn-sm" id="submit-btn">Add training</button>
            </div>
        </form>
        <div class="delete-zone" id="delete-zone" style="display:none">
            <button class="btn-danger-sm" onclick="deleteTraining()">Delete training</button>
        </div>
    </div>
</div>

<!-- Complete modal -->
<div class="overlay hidden" id="complete-overlay">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Mark as completed</span>
            <button class="modal-close" onclick="closeComplete()">✕</button>
        </div>
        <form onsubmit="submitComplete(event)">
            <div class="field">
                <label>Actual duration (min)</label>
                <input id="c-dur" type="number" min="1" required>
            </div>
            <div class="field">
                <label>Feedback / notes</label>
                <input id="c-feedback" type="text" maxlength="300" placeholder="How did it go?">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost btn-sm" onclick="closeComplete()">Cancel</button>
                <button type="submit" class="btn btn-green btn-sm">Mark done ✓</button>
            </div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const sportIcons = { RUNNING:'🏃', TENNIS:'🎾', CYCLING:'🚴', OTHER:'💪' };
    const cap = s => s.charAt(0) + s.slice(1).toLowerCase();

    let allTrainings = [], activeSport = 'ALL', editingId = null, completingId = null;

    async function loadTrainings() {
        try {
            allTrainings = await api('/api/users/1/trainings');
            render();
            renderStats();
        } catch(e) {
            document.querySelectorAll('.loading-msg').forEach(el => el.textContent = 'Failed to load.');
        }
    }

    function renderStats() {
        const counts = {};
        allTrainings.forEach(t => { counts[t.sportType] = (counts[t.sportType]||0)+1; });
        const el = document.getElementById('sport-stats');
        el.innerHTML = '';
        Object.entries(counts).forEach(([sport, count]) => {
            el.innerHTML += `<div class="sport-stat"><div class="icon">${sportIcons[sport]||'💪'}</div><div class="count">${count}</div><div class="name">${cap(sport)}</div></div>`;
        });
    }

    function render() {
        const now = new Date();
        const filtered = activeSport === 'ALL' ? allTrainings : allTrainings.filter(t => t.sportType === activeSport);
        const upcoming = filtered.filter(t => !t.completed && new Date(t.scheduledAt) >= now)
            .sort((a,b) => new Date(a.scheduledAt)-new Date(b.scheduledAt));
        const past = filtered.filter(t => t.completed || new Date(t.scheduledAt) < now)
            .sort((a,b) => new Date(b.scheduledAt)-new Date(a.scheduledAt));

        // Upcoming cards
        const upGrid = document.getElementById('upcoming-grid');
        upGrid.innerHTML = '';
        if (upcoming.length === 0) { upGrid.innerHTML = '<div class="empty">No upcoming sessions.</div>'; }
        else upcoming.forEach(t => {
            const d = new Date(t.scheduledAt);
            const dateStr = d.toLocaleDateString('en-BE', { weekday:'short', month:'short', day:'numeric' });
            const timeStr = d.toLocaleTimeString('en-BE', { hour:'2-digit', minute:'2-digit' });
            const card = document.createElement('div'); card.className = 't-card';
            card.innerHTML = `
                <div class="t-sport-row">
                    <span class="t-icon">${sportIcons[t.sportType]||'💪'}</span>
                    <span class="t-sport-name">${cap(t.sportType)}</span>
                    <span class="t-badge upcoming">scheduled</span>
                </div>
                <div class="t-date">${dateStr} at ${timeStr}</div>
                <div class="t-details">
                    <span>⏱ ${t.plannedDurationMinutes} min</span>
                    ${t.distanceKm ? `<span>📏 ${t.distanceKm} km</span>` : ''}
                </div>
                ${t.notes ? `<div class="t-notes">${esc(t.notes)}</div>` : ''}
                <div class="t-actions">
                    <button class="btn btn-green btn-sm" onclick="openComplete(${t.id}, ${t.plannedDurationMinutes})">✓ Done</button>
                    <button class="btn btn-ghost btn-sm" onclick="openEdit(${t.id})">Edit</button>
                    <button class="btn-danger-sm" onclick="confirmDelete(${t.id})">Delete</button>
                </div>
            `;
            upGrid.appendChild(card);
        });

        // Past list
        const pastList = document.getElementById('past-list');
        pastList.innerHTML = '';
        if (past.length === 0) { pastList.innerHTML = '<div class="empty">No past sessions.</div>'; }
        else past.forEach(t => {
            const d = new Date(t.scheduledAt);
            const dateStr = d.toLocaleDateString('en-BE', { weekday:'short', month:'short', day:'numeric' });
            const dur = t.actualDurationMinutes || t.plannedDurationMinutes;
            const isMissed = !t.completed && new Date(t.scheduledAt) < new Date();
            const badge = t.completed ? '✓' : isMissed ? '—' : '';
            const row = document.createElement('div'); row.className = 'past-row';
            row.innerHTML = `
                <span class="past-icon">${sportIcons[t.sportType]||'💪'}</span>
                <span class="past-name">${cap(t.sportType)}${t.feedback ? ` — <span style="color:#666;font-weight:normal;font-size:0.76rem;">${esc(t.feedback)}</span>` : ''}</span>
                <span class="past-date">${dateStr}</span>
                <span class="past-dur">${dur} min${t.distanceKm ? ` · ${t.distanceKm}km` : ''}${badge ? ` ${badge}` : ''}</span>
                <div class="past-actions">
                    ${!t.completed ? `<button class="icon-btn" onclick="openComplete(${t.id}, ${t.plannedDurationMinutes})" title="Mark done">✓</button>` : ''}
                    <button class="icon-btn" onclick="openEdit(${t.id})" title="Edit">✎</button>
                    <button class="icon-btn del" onclick="confirmDelete(${t.id})" title="Delete">✕</button>
                </div>
            `;
            pastList.appendChild(row);
        });
    }

    // Add / Edit modal
    function openAdd() {
        editingId = null;
        document.getElementById('modal-title').textContent = 'Add training';
        document.getElementById('training-form').reset();
        document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
        document.getElementById('f-time').value = '07:00';
        document.getElementById('recur-section').style.display = '';
        document.getElementById('recur-box').style.display = 'none';
        document.getElementById('delete-zone').style.display = 'none';
        document.getElementById('submit-btn').textContent = 'Add training';
        document.getElementById('overlay').classList.remove('hidden');
    }

    function openEdit(id) {
        const t = allTrainings.find(x => x.id === id); if (!t) return;
        editingId = id;
        document.getElementById('modal-title').textContent = 'Edit training';
        document.getElementById('f-sport').value = t.sportType;
        document.getElementById('f-dur').value = t.plannedDurationMinutes;
        const dt = new Date(t.scheduledAt);
        document.getElementById('f-date').value = dt.toISOString().slice(0,10);
        document.getElementById('f-time').value = dt.toTimeString().slice(0,5);
        document.getElementById('f-dist').value = t.distanceKm || '';
        document.getElementById('f-notes').value = t.notes || '';
        document.getElementById('recur-section').style.display = 'none';
        document.getElementById('delete-zone').style.display = 'block';
        document.getElementById('submit-btn').textContent = 'Save changes';
        document.getElementById('overlay').classList.remove('hidden');
    }

    function toggleRecur() {
        const on = document.getElementById('f-recur').checked;
        document.getElementById('recur-box').style.display = on ? 'block' : 'none';
        if (on && !document.getElementById('f-until').value) {
            const d = new Date(); d.setMonth(d.getMonth()+3);
            document.getElementById('f-until').value = d.toISOString().slice(0,10);
        }
    }

    function generateDates(startDate, startTime, freq, until) {
        const dates = [];
        const end = new Date(until);
        let cur = new Date(`${startDate}T${startTime}`);
        while (cur <= end) {
            dates.push(new Date(cur));
            if (freq === 'daily') cur.setDate(cur.getDate()+1);
            else if (freq === 'weekly') cur.setDate(cur.getDate()+7);
            else { cur.setMonth(cur.getMonth()+1); }
        }
        return dates;
    }

    async function submitTraining(e) {
        e.preventDefault();
        const sport = document.getElementById('f-sport').value;
        const dur = parseInt(document.getElementById('f-dur').value);
        const date = document.getElementById('f-date').value;
        const time = document.getElementById('f-time').value;
        const dist = parseFloat(document.getElementById('f-dist').value) || null;
        const notes = document.getElementById('f-notes').value.trim() || null;
        const scheduledAt = `${date}T${time}:00`;

        if (editingId) {
            try {
                await fetch(`/api/users/1/trainings/${editingId}`, {
                    method:'PUT', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ sportType:sport, scheduledAt, plannedDurationMinutes:dur, distanceKm:dist, notes })
                });
                closeModal(); await loadTrainings(); toast('Training updated','success');
            } catch(e) { toast('Failed to save','error'); }
            return;
        }

        const isRecur = document.getElementById('f-recur').checked;
        if (isRecur) {
            const freq = document.getElementById('f-freq').value;
            const until = document.getElementById('f-until').value;
            const dates = generateDates(date, time, freq, until);
            if (dates.length === 0) { toast('No dates in range','error'); return; }
            if (dates.length > 52) { if (!confirm(`This will create ${dates.length} trainings. Continue?`)) return; }
            try {
                for (const d of dates) {
                    await fetch('/api/users/1/trainings', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ sportType:sport, scheduledAt: d.toISOString().slice(0,16)+':00', plannedDurationMinutes:dur, distanceKm:dist, notes })
                    });
                }
                closeModal(); await loadTrainings(); toast(`${dates.length} training${dates.length>1?'s':''} added ✓`,'success');
            } catch(e) { toast('Failed to create some trainings','error'); }
        } else {
            try {
                await fetch('/api/users/1/trainings', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ sportType:sport, scheduledAt, plannedDurationMinutes:dur, distanceKm:dist, notes })
                });
                closeModal(); await loadTrainings(); toast('Training added','success');
            } catch(e) { toast('Failed to save','error'); }
        }
    }

    async function deleteTraining() {
        if (!editingId) return;
        if (!confirm('Delete this training?')) return;
        try {
            await fetch(`/api/users/1/trainings/${editingId}`, { method:'DELETE' });
            closeModal(); await loadTrainings(); toast('Deleted','success');
        } catch(e) { toast('Failed to delete','error'); }
    }

    async function confirmDelete(id) {
        if (!confirm('Delete this training?')) return;
        try {
            await fetch(`/api/users/1/trainings/${id}`, { method:'DELETE' });
            await loadTrainings(); toast('Deleted','success');
        } catch(e) { toast('Failed to delete','error'); }
    }

    function closeModal() { document.getElementById('overlay').classList.add('hidden'); editingId = null; }

    // Complete modal
    function openComplete(id, plannedDur) {
        completingId = id;
        document.getElementById('c-dur').value = plannedDur;
        document.getElementById('c-feedback').value = '';
        document.getElementById('complete-overlay').classList.remove('hidden');
        document.getElementById('c-dur').focus();
    }

    async function submitComplete(e) {
        e.preventDefault();
        const dur = parseInt(document.getElementById('c-dur').value);
        const feedback = document.getElementById('c-feedback').value.trim() || null;
        try {
            await fetch(`/api/users/1/trainings/${completingId}/complete`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ actualDurationMinutes: dur, feedback })
            });
            closeComplete(); await loadTrainings(); toast('Training completed ✓','success');
        } catch(e) { toast('Failed to save','error'); }
    }

    function closeComplete() { document.getElementById('complete-overlay').classList.add('hidden'); completingId = null; }

    // Filter pills
    document.getElementById('filters').addEventListener('click', e => {
        const pill = e.target.closest('.pill'); if (!pill) return;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active'); activeSport = pill.dataset.sport; render();
    });

    document.getElementById('overlay').addEventListener('click', e => { if (e.target===document.getElementById('overlay')) closeModal(); });
    document.getElementById('complete-overlay').addEventListener('click', e => { if (e.target===document.getElementById('complete-overlay')) closeComplete(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeComplete(); } });

    let toastTimer;
    function toast(msg, type='') {
        const el = document.getElementById('toast');
        el.textContent = msg; el.className = `toast ${type}`;
        void el.offsetWidth; el.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    async function api(url) { const r = await fetch(url); if (!r.ok) throw new Error(); return r.json(); }

    loadTrainings();
</script>
</body>
</html>
