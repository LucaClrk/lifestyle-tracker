<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits — Performance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; padding: 2rem; }

        .topbar { display: flex; align-items: center; gap: 0.75rem; max-width: 860px; margin: 0 auto 2rem; }
        .back { color: #555; text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
        .back:hover { color: #aaa; }
        .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .spacer { flex: 1; }

        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #e5e5e5; }
        .btn-ghost { background: transparent; color: #888; border: 1px solid #333; }
        .btn-ghost:hover { color: #ccc; border-color: #555; }
        .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
        .btn-danger-sm { background: transparent; border: 1px solid #3a1a1a; color: #f87171; font-size: 0.78rem; padding: 0.3rem 0.65rem; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .btn-danger-sm:hover { background: #2a1010; }

        .content { max-width: 860px; margin: 0 auto; }

        .today-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
        .today-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem; }
        .today-label { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }
        .today-count { font-size: 1.25rem; font-weight: 700; }
        .big-bar-track { height: 8px; background: #222; border-radius: 99px; overflow: hidden; }
        .big-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #a3e635, #65a30d); transition: width 0.6s ease; }

        .section { margin-bottom: 2rem; }
        .section-header { font-size: 0.75rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }

        .habit-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.85rem; transition: border-color 0.15s; }
        .habit-item:hover { border-color: #333; }

        .habit-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; cursor: pointer; transition: all 0.2s; user-select: none; }
        .habit-check:hover { border-color: #666; }
        .habit-check.done { background: #1a2e05; border-color: #a3e635; color: #a3e635; }

        .habit-info { flex: 1; min-width: 0; }
        .habit-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .habit-desc { font-size: 0.76rem; color: #555; margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .habit-right { display: flex; align-items: center; gap: 0.65rem; flex-shrink: 0; }
        .week-dots { display: flex; gap: 3px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #222; }
        .dot.logged { background: #a3e635; }
        .dot.today { background: #60a5fa; }

        .habit-freq { font-size: 0.72rem; color: #555; white-space: nowrap; }

        .habit-actions { display: flex; gap: 0.3rem; opacity: 0; transition: opacity 0.15s; }
        .habit-item:hover .habit-actions { opacity: 1; }
        .icon-btn { background: none; border: none; color: #555; cursor: pointer; padding: 0.2rem 0.3rem; border-radius: 5px; font-size: 0.85rem; transition: color 0.15s; }
        .icon-btn:hover { color: #ccc; }
        .icon-btn.del:hover { color: #f87171; }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .overlay.hidden { display: none; }
        .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 460px; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .modal-title { font-size: 1rem; font-weight: 600; }
        .modal-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 4px; }
        .modal-close:hover { color: #ccc; }

        .field { margin-bottom: 0.9rem; }
        .field label { display: block; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
        .field input, .field select, .field textarea { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.6rem 0.75rem; color: #f0f0f0; font-size: 0.9rem; font-family: inherit; transition: border-color 0.15s; }
        .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #555; }
        .field select option { background: #1a1a1a; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
        .delete-zone { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid #222; display: flex; justify-content: flex-start; }

        /* Toast */
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 0.7rem 1.1rem; font-size: 0.85rem; color: #ccc; z-index: 200; transform: translateY(1rem); opacity: 0; transition: all 0.25s; pointer-events: none; max-width: 260px; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #166534; color: #a3e635; }
        .toast.error { border-color: #7f1d1d; color: #f87171; }

        .empty { color: #444; font-size: 0.85rem; padding: 0.5rem 0; }
        .loading-msg { color: #444; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="topbar">
    <a class="back" href="/">← Home</a>
    <h1 class="page-title">Habits</h1>
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="openAdd()">+ Add habit</button>
</div>

<div class="content">
    <div class="today-card">
        <div class="today-row">
            <span class="today-label">Today's progress</span>
            <span class="today-count" id="today-count">…</span>
        </div>
        <div class="big-bar-track"><div class="big-bar-fill" id="today-bar" style="width:0%"></div></div>
    </div>
    <div id="habits-content"><div class="loading-msg">Loading…</div></div>
</div>

<!-- Modal -->
<div class="overlay hidden" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">Add habit</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form id="habit-form" onsubmit="submitHabit(event)">
            <div class="field">
                <label>Name</label>
                <input id="f-name" type="text" required maxlength="100" placeholder="e.g. Drink 2L water">
            </div>
            <div class="field">
                <label>Description</label>
                <input id="f-desc" type="text" maxlength="200" placeholder="Optional">
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Category</label>
                    <select id="f-cat">
                        <option value="HYDRATION">Hydration</option>
                        <option value="NUTRITION">Nutrition</option>
                        <option value="SLEEP">Sleep</option>
                        <option value="EXERCISE">Exercise</option>
                        <option value="RECOVERY">Recovery</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="field">
                    <label>Days per week (target)</label>
                    <input id="f-days" type="number" min="1" max="7" value="7" required>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary btn-sm" id="submit-btn">Save</button>
            </div>
        </form>
        <div class="delete-zone" id="delete-zone" style="display:none">
            <button class="btn-danger-sm" onclick="deleteHabit()">Deactivate habit</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const catIcons = { SLEEP:'😴', HYDRATION:'💧', NUTRITION:'🥗', EXERCISE:'🏋️', RECOVERY:'🧘', OTHER:'✅' };
    const catOrder = ['EXERCISE','NUTRITION','HYDRATION','SLEEP','RECOVERY','OTHER'];

    let habits = [], todayLogs = [], weekLogs = [];
    let editingId = null;

    const today = new Date().toISOString().slice(0,10);

    async function loadAll() {
        try {
            [habits, todayLogs, weekLogs] = await Promise.all([
                api('/api/users/1/habits'),
                api('/api/users/1/habits/logs/today'),
                api('/api/users/1/habits/logs/week')
            ]);
            render();
        } catch(e) {
            document.getElementById('habits-content').innerHTML = '<div class="empty">Failed to load.</div>';
        }
    }

    function render() {
        const todayDone = new Map();
        todayLogs.forEach(l => todayDone.set(l.habit?.id, l.completed));

        const weekByHabit = {};
        weekLogs.forEach(l => {
            const hid = l.habit?.id;
            if (!weekByHabit[hid]) weekByHabit[hid] = new Set();
            if (l.completed) weekByHabit[hid].add((l.date||'').slice(0,10));
        });

        const done = [...todayDone.values()].filter(Boolean).length;
        const total = habits.length;
        document.getElementById('today-count').textContent = `${done} / ${total}`;
        document.getElementById('today-bar').style.width = total > 0 ? `${(done/total*100).toFixed(1)}%` : '0%';

        const container = document.getElementById('habits-content');
        container.innerHTML = '';

        if (habits.length === 0) { container.innerHTML = '<div class="empty">No active habits. Add one above.</div>'; return; }

        const byCategory = {};
        habits.forEach(h => { const c = h.category||'OTHER'; if (!byCategory[c]) byCategory[c]=[]; byCategory[c].push(h); });
        const ordered = [...catOrder.filter(c=>byCategory[c]), ...Object.keys(byCategory).filter(c=>!catOrder.includes(c))];

        const dayOfWeek = new Date().getDay();
        const weekDates = Array.from({length:7}, (_,i) => {
            const d = new Date(); d.setDate(d.getDate() - ((dayOfWeek+6-i)%7)); return d.toISOString().slice(0,10);
        });

        ordered.forEach(cat => {
            const sec = document.createElement('div'); sec.className = 'section';
            const header = document.createElement('div'); header.className = 'section-header';
            header.innerHTML = `<span>${catIcons[cat]||'✅'}</span> ${cat.charAt(0)+cat.slice(1).toLowerCase()}`;
            sec.appendChild(header);

            byCategory[cat].forEach(h => {
                const isDone = todayDone.get(h.id) === true;
                const logged = weekByHabit[h.id] || new Set();
                const dots = weekDates.map(d => {
                    const isToday = d === today;
                    const hit = logged.has(d);
                    return `<div class="dot ${hit && isToday ? 'today' : hit ? 'logged' : ''}"></div>`;
                }).join('');

                const item = document.createElement('div'); item.className = 'habit-item';
                item.innerHTML = `
                    <div class="habit-check ${isDone?'done':''}" onclick="toggleHabit(${h.id}, ${isDone})">
                        ${isDone ? '✓' : ''}
                    </div>
                    <div class="habit-info">
                        <div class="habit-name">${esc(h.name)}</div>
                        ${h.description ? `<div class="habit-desc">${esc(h.description)}</div>` : ''}
                    </div>
                    <div class="habit-right">
                        <div class="week-dots">${dots}</div>
                        <div class="habit-freq">${h.targetDaysPerWeek}×/wk</div>
                        <div class="habit-actions">
                            <button class="icon-btn" onclick="openEdit(${h.id})" title="Edit">✎</button>
                            <button class="icon-btn del" onclick="promptDelete(${h.id})" title="Deactivate">✕</button>
                        </div>
                    </div>
                `;
                sec.appendChild(item);
            });
            container.appendChild(sec);
        });
    }

    async function toggleHabit(habitId, currentlyDone) {
        try {
            await fetch(`/api/users/1/habits/${habitId}/log`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ date: today, completed: !currentlyDone, notes: null })
            });
            await loadAll();
            toast(!currentlyDone ? 'Habit checked ✓' : 'Habit unchecked', 'success');
        } catch(e) { toast('Failed to update', 'error'); }
    }

    function openAdd() {
        editingId = null;
        document.getElementById('modal-title').textContent = 'Add habit';
        document.getElementById('habit-form').reset();
        document.getElementById('delete-zone').style.display = 'none';
        document.getElementById('submit-btn').textContent = 'Add habit';
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('f-name').focus();
    }

    function openEdit(id) {
        const h = habits.find(x => x.id === id);
        if (!h) return;
        editingId = id;
        document.getElementById('modal-title').textContent = 'Edit habit';
        document.getElementById('f-name').value = h.name;
        document.getElementById('f-desc').value = h.description || '';
        document.getElementById('f-cat').value = h.category || 'OTHER';
        document.getElementById('f-days').value = h.targetDaysPerWeek;
        document.getElementById('delete-zone').style.display = 'flex';
        document.getElementById('submit-btn').textContent = 'Save changes';
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('f-name').focus();
    }

    async function submitHabit(e) {
        e.preventDefault();
        const body = {
            name: document.getElementById('f-name').value.trim(),
            description: document.getElementById('f-desc').value.trim() || null,
            category: document.getElementById('f-cat').value,
            targetDaysPerWeek: parseInt(document.getElementById('f-days').value)
        };
        try {
            const url = editingId ? `/api/users/1/habits/${editingId}` : '/api/users/1/habits';
            const method = editingId ? 'PUT' : 'POST';
            await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            closeModal();
            await loadAll();
            toast(editingId ? 'Habit updated' : 'Habit added', 'success');
        } catch(e) { toast('Failed to save', 'error'); }
    }

    async function deleteHabit() {
        if (!editingId) return;
        if (!confirm('Deactivate this habit?')) return;
        try {
            await fetch(`/api/users/1/habits/${editingId}`, { method: 'DELETE' });
            closeModal();
            await loadAll();
            toast('Habit deactivated', 'success');
        } catch(e) { toast('Failed to delete', 'error'); }
    }

    async function promptDelete(id) {
        openEdit(id);
    }

    function closeModal() { document.getElementById('overlay').classList.add('hidden'); editingId = null; }

    document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    let toastTimer;
    function toast(msg, type='') {
        const el = document.getElementById('toast');
        el.textContent = msg; el.className = `toast ${type}`;
        void el.offsetWidth; el.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function api(url) { const r = await fetch(url); if (!r.ok) throw new Error(); return r.json(); }

    loadAll();
</script>
</body>
</html>
